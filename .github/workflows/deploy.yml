name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_DIFY_BASE_URL: ${{ secrets.VITE_DIFY_BASE_URL }}
          VITE_DIFY_API_KEY: ${{ secrets.VITE_DIFY_API_KEY }}
          VITE_PROXY_URL: ${{ secrets.VITE_PROXY_URL }}
          VITE_PROXY_API_KEY: ${{ secrets.VITE_PROXY_API_KEY }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
